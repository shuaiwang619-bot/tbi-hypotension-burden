<text x="315.0" y="1560.0" font-family="Arial" font-size="31" font-weight="normal" fill="#222426" text-anchor="start">The winsorized curve can remain steep at high burden because truncation redistributes the extreme tail at the P99 cap. The key check is the likelihood-ratio comparison with the winsorized linear fit: after</text>
